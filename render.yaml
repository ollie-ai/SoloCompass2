services:
  - type: web
    name: solocompass-backend
    env: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm ci --only=production
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3005
      # The following secrets are managed via Render's dashboard / environment groups.
      # Set INFISICAL_CLIENT_ID, INFISICAL_CLIENT_SECRET, INFISICAL_PROJECT_ID there.
      # All other secrets (DATABASE_URL, JWT_SECRET, etc.) are injected at runtime
      # by the Infisical SDK using the credentials above.
      - key: INFISICAL_CLIENT_ID
        sync: false
      - key: INFISICAL_CLIENT_SECRET
        sync: false
      - key: INFISICAL_PROJECT_ID
        sync: false
    autoDeploy: true
